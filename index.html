<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MoodMeal, la giusta ricetta in base tuo umore</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <header>
    <div class="logo">Benvenuto/a su MoodMeal</div>
    <p class="tagline">Ciao, sono un servizio totalmente gratuito che in base a come stai ti dice cosa cucinare</p>
  </header>

  <main>
    <section class="mood-picker">
      <h2>Scegli qual'è il tuo umore al momento:</h2>
      <div class="moods">
        <button class="mood-btn" data-mood="felice">😄 Felice</button>
        <button class="mood-btn" data-mood="stanco">😴 Stanco</button>
        <button class="mood-btn" data-mood="triste">😢 Triste</button>
        <button class="mood-btn" data-mood="arrabbiato">😡 Arrabbiato</button>
        <button class="mood-btn" data-mood="romantico">🥰 Romantico</button>
        <button class="mood-btn" data-mood="avventuroso">🤠 Avventuroso</button>
      </div>
    </section>

    <section class="result-box" id="result" style="display:none;">
      <div class="spinner" id="spinner">🍳</div>
      <div class="recipe-card" id="recipe-card"></div>
    </section>

    
  </main>

  <footer>
    <p>MoodMeal Web Service &copy; 2026 —  API pubblica</p>
  </footer>

  <script>
    document.querySelectorAll('.mood-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const mood = btn.dataset.mood;
        const resultSection = document.getElementById('result');
        const spinner = document.getElementById('spinner');
        const card = document.getElementById('recipe-card');

        resultSection.style.display = 'block';
        spinner.style.display = 'block';
        card.innerHTML = '';
        card.style.display = 'none';

        resultSection.scrollIntoView({ behavior: 'smooth' });

        try {
          const res = await fetch(`api.php?mood=${encodeURIComponent(mood)}`);
          const data = await res.json();

          spinner.style.display = 'none';
          card.style.display = 'block';

          card.innerHTML = `
            <div class="card-emoji">${data.emoji}</div>
            <h3>${data.recipe}</h3>
            <p class="mood-message">${data.message}</p>
            <div class="meta">
              <span>⏱ ${data.time_minutes} min</span>
              <span>📊 ${data.difficulty}</span>
              <span>🍽 ${data.servings} porzioni</span>
            </div>
            <div class="ingredients">
              <h4>Ingredienti</h4>
              <ul>${data.ingredients.map(i => `<li>${i}</li>`).join('')}</ul>
            </div>
            <div class="steps">
              <h4>Come si fa</h4>
              <ol>${data.steps.map(s => `<li>${s}</li>`).join('')}</ol>
            </div>
          `;
        } catch (e) {
          spinner.style.display = 'none';
          card.style.display = 'block';
          card.innerHTML = `<p class="error">Errore nella chiamata API. Assicurati che api.php sia raggiungibile.</p>`;
        }
      });
    });
  </script>
</body>
</html>
